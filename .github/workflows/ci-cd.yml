name: TPMS CI/CD

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore TPMS.slnx
      - name: Test
        run: dotnet test TPMS.slnx --configuration Release --no-restore

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/TPMS.Web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build

  docker:
    if: github.event_name == 'push'
    needs:
      - backend
      - web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/tpms-api:${{ github.sha }}
      - name: Build and push Edge image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.edge
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/tpms-edge:${{ github.sha }}
      - name: Deploy API to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/tpms-api:${{ github.sha }}
